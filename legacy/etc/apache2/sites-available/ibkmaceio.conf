<VirtualHost *:80>
        ServerAdmin contato@hamiltonjunior.com.br
        DocumentRoot /var/www/ibkmaceio
        ServerName ibkmaceio.com.br
        ServerAlias www.ibkmaceio.com.br

        <Directory /var/www/ibkmaceio/>
                Options FollowSymLinks
                AllowOverride All
                Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/ibkmaceio-error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        RewriteEngine on
</VirtualHost>
