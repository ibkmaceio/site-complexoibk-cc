name: Limpar workflow runs antigos

on:
  schedule:
    # Todo domingo à meia-noite
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Apagar runs com mais de 30 dias
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 3
