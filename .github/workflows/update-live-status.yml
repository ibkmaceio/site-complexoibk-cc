name: Update Live Status

on:
  schedule:
    - cron: "*/5 * * * *" # a cada 5 min (mínimo permitido pelo GitHub)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (para acesso ao script)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-tree

      - name: Checkout live-status branch
        uses: actions/checkout@v4
        with:
          ref: live-status
          path: status-tree
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node main-tree/scripts/update-live-status.mjs status-tree/live-status.json

      - name: Commit and push
        working-directory: status-tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-status.json
          git commit -m "chore: update live-status [skip ci]"
          # Squash para manter a branch live-status com poucos commits
          git reset --soft $(git rev-list --max-parents=0 HEAD)
          git commit --amend --no-edit --reset-author
          git push --force origin live-status
