name: Update Live Status

on:
  schedule:
    - cron: "*/5 * * * *" # a cada 5 min (mínimo permitido pelo GitHub)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (para acesso ao script)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-tree

      - name: Checkout live-status branch
        uses: actions/checkout@v4
        with:
          ref: live-status
          path: status-tree
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        id: update
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set +e
          node main-tree/scripts/update-live-status.mjs status-tree/live-status.json
          code=$?
          echo "code=$code" >> $GITHUB_OUTPUT
          if [ $code -ne 0 ] && [ $code -ne 78 ]; then exit $code; fi

      - name: Commit and push if changed
        if: steps.update.outputs.code == '0'
        working-directory: status-tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-status.json
          git commit -m "chore: update live-status [skip ci]"
          git push origin live-status
